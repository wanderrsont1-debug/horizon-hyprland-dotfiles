<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="design.css">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <!-- Command Palette -->
    <div id="command-palette" class="mg-cmd-overlay" hidden>
        <div class="mg-cmd-modal">
            <input type="text" id="cmd-input" class="mg-cmd-input" placeholder="Type a command…" autocomplete="off">
            <div id="cmd-results" class="mg-cmd-results"></div>
        </div>
    </div>

    <div class="popup">
        <!-- Header -->
        <header class="popup-header">
            <div class="popup-brand">
                <img src="icons/icon-48.png" alt="" class="popup-logo">
                <span class="popup-title">MatugenFox</span>
            </div>
            <div id="status-badge" class="mg-badge mg-badge-muted">
                <span class="mg-badge-dot"></span>
                <span id="status-label">…</span>
            </div>
        </header>

        <!-- First Run -->
        <div id="first-run" class="popup-firstrun" hidden>
            <p>Welcome! Open <strong>Settings</strong> to set your Matugen paths.</p>
            <button id="dismiss-firstrun" class="mg-btn mg-btn-sm">Got it</button>
        </div>

        <!-- Palette -->
        <section class="popup-section">
            <div class="mg-label">Active Palette</div>
            <div id="palette-preview" class="popup-palette">
                <div class="popup-palette-empty">No theme yet<br><span
                        style="font-size:11px;color:var(--mg-text-2)">Start Matugen to generate one</span></div>
            </div>
            <div id="sync-info" class="popup-meta">Waiting for first sync…</div>
        </section>

        <!-- Theming -->
        <section class="popup-section">
            <div class="mg-label">Theme Source</div>
            <select id="theme-source-select" class="mg-select mg-btn-full">
                <option value="">Matugen</option>
            </select>
        </section>

        <!-- Site Card -->
        <section id="site-card" class="popup-site-card" hidden>
            <div class="popup-site-header">
                <span class="popup-site-icon">🌐</span>
                <span id="site-hostname" class="popup-site-name">—</span>
                <span id="site-status" class="mg-badge mg-badge-sm">—</span>
            </div>
            <button id="toggle-site-btn" class="mg-btn mg-btn-outline mg-btn-full mg-btn-sm">
                Disable on this site
            </button>
        </section>

        <!-- Controls -->
        <section class="popup-controls">
            <div class="popup-control-row">
                <div class="popup-control-label"><span>⚡</span>Eco Mode</div>
                <label class="mg-toggle" aria-label="Toggle Eco Mode">
                    <input type="checkbox" id="toggle-eco">
                    <span class="mg-toggle-track"></span>
                </label>
            </div>
            <div class="popup-control-row" id="row-smooth">
                <div class="popup-control-label"><span>🌈</span>Smooth</div>
                <label class="mg-toggle" aria-label="Toggle Smooth Transitions">
                    <input type="checkbox" id="toggle-smooth" checked>
                    <span class="mg-toggle-track"></span>
                </label>
            </div>
            <div class="popup-control-row">
                <div class="popup-control-label"><span>🧊</span>Naked Mode</div>
                <label class="mg-toggle" aria-label="Toggle Naked Mode">
                    <input type="checkbox" id="toggle-naked">
                    <span class="mg-toggle-track"></span>
                </label>
            </div>
            <div class="popup-control-row">
                <div class="popup-control-label"><span>⏸️</span>Pause</div>
                <select id="pause-select" class="mg-select" aria-label="Pause duration">
                    <option value="0">Off</option>
                    <option value="600000">10 min</option>
                    <option value="3600000">1 hour</option>
                    <option value="-1">Until restart</option>
                </select>
            </div>
        </section>

        <!-- Footer -->
        <footer class="popup-footer">
            <button id="reapply-btn" class="mg-btn mg-btn-ghost" title="Reapply theme to current tab">⟳ Reapply</button>
            <button id="settings-btn" class="mg-btn mg-btn-ghost" title="Open settings">⚙ Settings</button>
        </footer>
        <div class="popup-shortcut">
            <kbd class="mg-kbd">Ctrl</kbd><span>+</span><kbd class="mg-kbd">Alt</kbd><span>+</span><kbd
                class="mg-kbd">C</kbd>
            <span>command palette</span>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
