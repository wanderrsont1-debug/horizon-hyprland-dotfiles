# ===================================================================
# ~/.config/foot/foot.ini
# ===================================================================

# 🎨 THEME & COLORS (Matugen Integration)
# Include the auto-generated colors from Matugen.
# Ensure this file contains a [colors] block header!
include=~/.config/foot/foot-colors.ini

[main]
# 🖥️  FONTS
# Fixes the "incredibly small" issue. Adjust the font name to your specific font.
# The :size=12 directive maps directly to your Kitty 12.0 setting for 1080p/1440p.
font=monospace:size=12
# Disable ligatures to match your Kitty config
font=monospace:size=12:fontfeatures=-liga:fontfeatures=-calt

# 🖼️  WINDOW & AESTHETICS (Hyprland Focused)
# Disable client-side decorations (CSD) since Hyprland handles window borders.
pad=0x0
# Hyprland will scale this, but setting initial dimensions helps mapping.
initial-window-size-pixels=700x500

[scrollback]
# 📜 SCROLLBACK & HISTORY
# Match your massive 100,000 line requirement.
lines=100000
# foot does not have a dedicated pager RAM allocation setting like Kitty;
# it dynamically allocates memory for scrollback.

[cursor]
# 🖱️  CURSOR
# Block cursor is default, but you prefer beam for Neovim.
style=beam
blink=yes
beam-thickness=2

[mouse]
# Hide mouse cursor when typing
hide-when-typing=yes

[bell]
# Silence the terminal bell for true minimalism
urgent=no
notify=no
visual=no

[key-bindings]
# ⌨️  ESSENTIAL KEYBINDINGS
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
