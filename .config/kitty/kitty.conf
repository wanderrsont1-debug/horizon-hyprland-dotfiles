# ===================================================================
# 🎨 THEME & COLORS
# ===================================================================
# Import the auto-generated colors. 
# Ensure 'kitty-colors.conf' has NO C-style (/* */) comments!
include kitty-colors.conf

# ===================================================================
# 🖥️  FONTS
# ===================================================================
font_family      auto
bold_font        auto
italic_font      auto
bold_italic_font auto

# Optimized for 1080p/1440p laptop screens
font_size 12.0

# Enable ligatures (e.g., => turns into an arrow)
disable_ligatures never

# ===================================================================
# 📜 SCROLLBACK & HISTORY
# ===================================================================
# Dramatically increase the lines kept in active RAM
scrollback_lines 100000

# Allocate up to 256MB of RAM for the pager history (Ctrl+Shift+H)
# Allows searching and scrolling through massive script outputs in `less`
scrollback_pager_history_size 256

# ===================================================================
# 🖱️  CURSOR & SHELL INTEGRATION
# ===================================================================
# Block cursor is generally preferred for Neovim/Vim users
cursor_shape beam
cursor_blink_interval 0.5
cursor_underline_thickness 4.0
cursor_stop_blinking_after 2.0

# 🚀 CURSOR TRAIL (The "Neovide" effect)
cursor_trail 10
cursor_trail_decay 0.15 0.4
cursor_trail_start_threshold 2

# Shell integration configuration
shell_integration no-cursor

# ===================================================================
# 🖼️  WINDOW & AESTHETICS (Hyprland Focused)
# ===================================================================
hide_window_decorations yes
confirm_os_window_close 0

# A slight padding keeps text from touching the absolute edge of the monitor
# window_padding_width 10

# Force pure Wayland backend
linux_display_server wayland

# Silence the terminal bell for true minimalism
enable_audio_bell no

# ===================================================================
# ⚡ PERFORMANCE & SYSTEM
# ===================================================================
# Hyprland handles vsync; disable Kitty's to minimize input latency
sync_to_monitor no
input_delay 3

# Disable Kitty's built-in update checker (Pacman handles this)
update_check_interval 0

# ===================================================================
# 📑 TABS (Powerline Style)
# ===================================================================
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_activity_symbol ⚡

active_tab_font_style   bold
inactive_tab_font_style normal

# ===================================================================
# ⌨️  ESSENTIAL KEYBINDINGS
# ===================================================================
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0
