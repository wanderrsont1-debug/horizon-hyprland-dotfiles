[calendars]

[[private]]
path = /home/new/.local/share/khal/calendars/private
type = calendar

[locale]
timeformat = %H:%M
dateformat = %Y-%m-%d
longdateformat = %Y-%m-%d
datetimeformat = %Y-%m-%d %H:%M
longdatetimeformat = %Y-%m-%d %H:%M
firstweekday = 0

[default]
default_calendar = private
highlight_event_days = True

[view]
min_calendar_display = 12
monthdisplay = firstday
theme = dark

[palette]
header = '', '', '', '#{{colors.primary.default.hex_stripped}}', '#{{colors.surface_container_highest.default.hex_stripped}}'
