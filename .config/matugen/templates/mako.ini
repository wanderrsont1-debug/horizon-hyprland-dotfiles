on-button-right=exec sh -c 'makoctl dismiss -n "$MAKO_NOTIFICATION_ID"; systemctl --user kill -s USR1 dusky_ram_monitor.service 2>/dev/null || pkill -USR1 -f dusky_ram_monitor_daemon.sh'
