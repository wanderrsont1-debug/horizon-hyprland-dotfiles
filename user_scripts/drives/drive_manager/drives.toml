hint = "game_simple"
fstype = "btrfs"
mount_options = ["discard=async", "compress=zstd:3", "noatime", "space_cache=v2", "autodefrag", "subvol=/"]

[drives.enclosure]
type = "PROTECTED"
mountpoint = "/mnt/enclosure"
