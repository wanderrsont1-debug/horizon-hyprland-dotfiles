[pages.layout.properties]
title = "Power Management"
icon = ""
description = ""

[[pages.layout.items]]
type = "selection"
[pages.layout.items.properties]
title = "Active Profile"
description = "Select performance mode"
value_command = "~/user_scripts/battery/tlp/tlp_mode_toggle.sh status"
icon = "power-profile-balanced-symbolic"
interval = 2
options = ["Balanced", "Performance", "Power Saver"]
options_map = { "balanced" = "Balanced", "performance" = "Performance", "power-saver" = "Power Saver" }
[pages.layout.items.on_change.Balanced]
type = "exec"
command = "~/user_scripts/battery/tlp/tlp_mode_toggle.sh balanced"
[pages.layout.items.on_change.Performance]
