[[pages]]
id = "home"
title = "Home"
icon = "user-home-symbolic"

[[pages.layout]]
type = "grid_section"
[pages.layout.properties]
title = "Quick Actions"

[[pages.layout.items]]
type = "toggle_card"
[pages.layout.items.properties]
title = "Bluetooth"
icon = "bluetooth-active-symbolic"
state_command = "rfkill list bluetooth | grep -q 'Soft blocked: no' && echo yes"
interval = 5
[pages.layout.items.on_toggle.enabled]
type = "exec"
command = "rfkill unblock bluetooth && notify-send 'Bluetooth' 'Bluetooth Turned ON'"
terminal = false
[pages.layout.items.on_toggle.disabled]
type = "exec"
command = "rfkill block bluetooth && notify-send 'Bluetooth' 'Bluetooth Turned OFF'"
terminal = false

[[pages.layout.items]]
type = "toggle_card"
[pages.layout.items.properties]
title = "Wi-Fi"
icon = "network-wireless-symbolic"
state_command = "rfkill list wifi | grep -q 'Soft blocked: no' && echo yes"
interval = 5
[pages.layout.items.on_toggle.enabled]
type = "exec"
command = "rfkill unblock wifi && notify-send 'Wi-Fi' 'Wireless Radio Turned ON'"
terminal = false
[pages.layout.items.on_toggle.disabled]
type = "exec"
command = "rfkill block wifi && notify-send 'Wi-Fi' 'Wireless Radio Turned OFF'"
terminal = false

[[pages.layout.items]]
type = "toggle_card"
[pages.layout.items.properties]
title = "Dark Mode"
