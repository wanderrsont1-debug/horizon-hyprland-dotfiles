type = "selection"
[pages.layout.items.layout.items.properties]
title = "Active Waybar"
description = "Current theme"
icon = "preferences-system-symbolic"
options_command = "find $HOME/.config/waybar -maxdepth 1 -type d -not -name '.*' -printf '%f\n' | sort"
value_command = "readlink -f $HOME/.config/waybar/config.jsonc | xargs dirname | xargs basename"
interval = 5
[pages.layout.items.layout.items.on_change]
type = "exec"
command = "ln -sf $HOME/.config/waybar/{value}/config.jsonc $HOME/.config/waybar/config.jsonc; ln -sf $HOME/.config/waybar/{value}/style.css $HOME/.config/waybar/style.css; killall -SIGUSR2 waybar"

