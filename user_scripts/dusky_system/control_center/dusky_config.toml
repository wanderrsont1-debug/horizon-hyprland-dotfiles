command = "~/user_scripts/battery/tlp/tlp_mode_toggle.sh power-saver"

[[pages.layout]]
type = "section"
[pages.layout.properties]
title = "Quick Controls"
icon = ""
description = ""

[[pages.layout.items]]
type = "slider"
[pages.layout.items.properties]
title = "Volume"
icon = "audio-volume-high-symbolic"
min = 0.0
max = 100.0
step = 1.0
default = 50.0
debounce = false
value_command = "wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100}'"
interval = 2
[pages.layout.items.on_change]
type = "exec"
command = "wpctl set-volume @DEFAULT_AUDIO_SINK@ {value}%"

[[pages.layout.items]]
type = "slider"
[pages.layout.items.properties]
title = "Brightness"
icon = "display-brightness-high-symbolic"
min = 1.0
max = 100.0
step = 1.0
default = 50.0
debounce = false
value_command = "brightnessctl -m | awk -F, '{print $4}' | tr -d %"
interval = 2
[pages.layout.items.on_change]
type = "exec"
command = "brightnessctl set {value}%"

[[pages.layout]]
type = "section"
[pages.layout.properties]
title = "Live System Status"
icon = ""
description = ""

[[pages.layout.items]]
type = "label"
[pages.layout.items.properties]
title = "Kernel"
