[[pages.layout.items]]
type = "navigation"
[pages.layout.items.properties]
title = "WireGuard"
description = "VPN tunnel management"
icon = "network-vpn-symbolic"

[[pages.layout.items.layout]]
type = "warning_banner"
[pages.layout.items.layout.properties]
title = "Privilege Requirements"
message = "Toggling tunnels uses sudo (wg-quick). Run the setup script once to configure NOPASSWD rules and fix /etc/wireguard permissions."

[[pages.layout.items.layout]]
type = "section"
[pages.layout.items.layout.properties]
title = "VPN Tunnels"
description = "Scans /etc/wireguard/ and immediate subdirectories for *.conf files"

[[pages.layout.items.layout.items]]
type = "file_generator"
[pages.layout.items.layout.items.properties]
path = "/etc/wireguard"
glob = "*.conf"
recursive = true

[pages.layout.items.layout.items.item_template]
type = "expander"
[pages.layout.items.layout.items.item_template.properties]
title = "{name_pretty}"
description = "{relpath}"
icon = "network-vpn-symbolic"

[[pages.layout.items.layout.items.item_template.items]]
type = "toggle"
[pages.layout.items.layout.items.item_template.items.properties]
title = "Enable Tunnel"
description = "Bring tunnel up or down"
icon = "network-vpn-symbolic"
state_command = "[ -d /sys/class/net/{name} ] && echo yes || echo no"
interval = 5
[pages.layout.items.layout.items.item_template.items.on_toggle.enabled]
type = "exec"
command = "sudo wg-quick up {path}"
terminal = false
[pages.layout.items.layout.items.item_template.items.on_toggle.disabled]
type = "exec"
command = "sudo wg-quick down {path}"
terminal = false

[[pages.layout.items.layout.items.item_template.items]]
type = "button"
[pages.layout.items.layout.items.item_template.items.properties]
title = "Edit Config"
description = "{path}"
icon = "document-edit-symbolic"
button_text = "Edit"
[pages.layout.items.layout.items.item_template.items.on_press]
type = "exec"
command = "kitty --class dusky_wg_edit --hold sh -c 'sudo $EDITOR {path}'"
terminal = false

[[pages.layout.items.layout.items.item_template.items]]
type = "button"
[pages.layout.items.layout.items.item_template.items.properties]
title = "Live Status"
description = "Open wg show {name} in terminal"
icon = "utilities-terminal-symbolic"
button_text = "Show"
[pages.layout.items.layout.items.item_template.items.on_press]
type = "exec"
command = "kitty --class dusky_wg_status --hold sh -c 'sudo wg show {name} 2>/dev/null || echo Inactive; echo; printf \"Press Enter to close...\"; read'"
terminal = false

[[pages.layout.items.layout.items.item_template.items]]
type = "button"
[pages.layout.items.layout.items.item_template.items.properties]
title = "Delete Tunnel"
description = "Permanently remove {relpath}"
icon = "list-remove-symbolic"
button_text = "Delete"
[pages.layout.items.layout.items.item_template.items.on_press]
type = "exec"
command = "kitty --class dusky_wg_delete --hold sh -c 'printf \"\\e[1;31mDelete {relpath}?\\e[0m [y/N] \"; read c; case $c in [Yy]) sudo rm {path} && echo \"Deleted {relpath}.\" || echo \"Failed.\";; *) echo \"Aborted.\";; esac; echo; printf \"Press Enter to close...\"; read'"
terminal = false

