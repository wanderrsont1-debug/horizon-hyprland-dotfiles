Hex Alpha Quick-Reference

    4D = 30% Opacity (Very transparent)

    66 = 40% Opacity

    80 = 50% Opacity

    99 = 60% Opacity (Good starting point for "slightly less transparent")

    B3 = 70% Opacity

    CC = 80% Opacity

    E6 = 90% Opacity (Almost completely solid)

Just swap those last two characters on the variables, run your Matugen command to regenerate the colors, and check the result.
